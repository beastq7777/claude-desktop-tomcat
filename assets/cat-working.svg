<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="body" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE4B5"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </radialGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="75" rx="35" ry="30" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="60" cy="45" r="30" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <!-- 耳朵 -->
  <polygon points="35,25 40,5 50,20" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <polygon points="85,25 80,5 70,20" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <polygon points="38,23 42,10 48,20" fill="#FFB6C1"/>
  <polygon points="82,23 78,10 72,20" fill="#FFB6C1"/>
  <!-- 眼睛 (工作状态 - 睁大) -->
  <ellipse cx="48" cy="42" rx="7" ry="8" fill="white"/>
  <ellipse cx="72" cy="42" rx="7" ry="8" fill="white"/>
  <circle cx="49" cy="43" r="5" fill="#2F4F4F"/>
  <circle cx="73" cy="43" r="5" fill="#2F4F4F"/>
  <circle cx="51" cy="41" r="2" fill="white"/>
  <circle cx="75" cy="41" r="2" fill="white"/>
  <!-- 星星眼睛效果 -->
  <text x="45" y="48" font-size="10" fill="#FFD700">★</text>
  <text x="69" y="48" font-size="10" fill="#FFD700">★</text>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="52" rx="4" ry="3" fill="#FFB6C1"/>
  <!-- 嘴巴 (工作状态 - 开心) -->
  <path d="M 50 58 Q 60 66 70 58" stroke="#8B7355" stroke-width="2" fill="none"/>
  <!-- 胡须 -->
  <line x1="35" y1="50" x2="15" y2="45" stroke="#8B7355" stroke-width="1"/>
  <line x1="35" y1="54" x2="15" y2="58" stroke="#8B7355" stroke-width="1"/>
  <line x1="85" y1="50" x2="105" y2="45" stroke="#8B7355" stroke-width="1"/>
  <line x1="85" y1="54" x2="105" y2="58" stroke="#8B7355" stroke-width="1"/>
  <!-- 尾巴 (工作状态 - 翘起) -->
  <path d="M 95 75 Q 115 50 105 35" stroke="#DEB887" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- 汗滴 (工作状态) -->
  <ellipse cx="30" cy="20" rx="3" ry="5" fill="#87CEEB"/>
  <ellipse cx="90" cy="25" rx="2" ry="4" fill="#87CEEB"/>
</svg>
