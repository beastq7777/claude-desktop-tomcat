<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="body" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE4B5"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </radialGradient>
  </defs>
  <!-- 身体 -->
  <ellipse cx="60" cy="75" rx="35" ry="30" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <!-- 头 -->
  <circle cx="60" cy="45" r="30" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <!-- 耳朵 -->
  <polygon points="35,25 40,5 50,20" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <polygon points="85,25 80,5 70,20" fill="url(#body)" stroke="#8B7355" stroke-width="2"/>
  <polygon points="38,23 42,10 48,20" fill="#FFB6C1"/>
  <polygon points="82,23 78,10 72,20" fill="#FFB6C1"/>
  <!-- 眼睛 (开心状态 - 弯弯的笑眼) -->
  <path d="M 42 42 Q 48 38 54 42" stroke="#2F4F4F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 66 42 Q 72 38 78 42" stroke="#2F4F4F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="52" rx="4" ry="3" fill="#FFB6C1"/>
  <!-- 嘴巴 (开心状态 - 大笑) -->
  <path d="M 48 58 Q 60 70 72 58" stroke="#8B7355" stroke-width="2" fill="#FFB6C1"/>
  <!-- 腮红 -->
  <ellipse cx="35" cy="52" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="85" cy="52" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  <!-- 胡须 -->
  <line x1="35" y1="50" x2="15" y2="48" stroke="#8B7355" stroke-width="1"/>
  <line x1="35" y1="54" x2="15" y2="56" stroke="#8B7355" stroke-width="1"/>
  <line x1="85" y1="50" x2="105" y2="48" stroke="#8B7355" stroke-width="1"/>
  <line x1="85" y1="54" x2="105" y2="56" stroke="#8B7355" stroke-width="1"/>
  <!-- 尾巴 -->
  <path d="M 95 80 Q 115 65 110 45" stroke="#DEB887" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- 星星装饰 -->
  <text x="20" y="25" font-size="12" fill="#FFD700">✨</text>
  <text x="85" y="15" font-size="10" fill="#FFD700">⭐</text>
  <text x="95" y="85" font-size="8" fill="#FFD700">✨</text>
</svg>
